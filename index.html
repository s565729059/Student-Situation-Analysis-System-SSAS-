<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小睿同学智能辅助系统</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>小睿同学智能辅助系统</h1>
            <p class="subtitle">智慧教育，高效赋能</p>
        </header>
        
        <main>
            <div class="tabs-container">
                <div class="department-title">
                    <h2>🚀 落地项目</h2>
                    <p>已上线运行，可直接使用</p>
                </div>
                
                <div class="function-cards">
                    <div class="function-card active" onclick="window.location.href='student-analysis.html'">
                        <span class="dept-tag dept-tag-xueguan">学管部主推</span>
                        <div class="card-icon">📊</div>
                        <h3>学生情况分析</h3>
                        <p class="card-desc">全面分析学生学习情况，生成个性化报告</p>
                        <div class="enter-btn">进入系统</div>
                    </div>
                    
                    <div class="function-card active" onclick="window.location.href='exam-analysis.html'">
                        <span class="dept-tag dept-tag-jiaoxue">教学部主推</span>
                        <div class="card-icon">📝</div>
                        <h3>试卷分析</h3>
                        <p class="card-desc">智能分析试卷数据，生成详细的考试报告</p>
                        <div class="enter-btn">进入系统</div>
                    </div>
                </div>
                
                <div class="department-title">
                    <h2>🔧 努力开发中</h2>
                    <p>正在紧锣密鼓地开发，敬请期待</p>
                </div>
                
                <div class="function-cards">
                    <div class="function-card" onclick="window.location.href='student-exam-analysis.html'">
                        <span class="dept-tag dept-tag-jiaoxue">教学部主推</span>
                        <div class="card-icon">🎯</div>
                        <h3>学员考情分析</h3>
                        <p class="card-desc">针对个体学员进行深度考情分析，提供精准辅导方案</p>
                        <div class="beta-tag">限时内测</div>
                    </div>
                </div>
                
                <div class="department-title">
                    <h2>📋 等待开发</h2>
                    <p>规划中，即将启动</p>
                </div>
                
                <div class="function-cards">
                    <div class="function-card" onclick="window.location.href='#'">
                        <span class="dept-tag dept-tag-jiaoxue">教学部主推</span>
                        <div class="card-icon">💬</div>
                        <h3>反馈生成</h3>
                        <p class="card-desc">小睿同学辅助生成学生学习反馈和个性化建议</p>
                        <div class="coming-soon">即将上线</div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2026 青岛睿花苑·AI促进组</p>
            <p class="version-info">版本号：v3.0</p>
        </footer>
    </div>
    
    <div class="suggestion-float">
        <a href="https://v.wjx.cn/vm/YdOJdTE.aspx" target="_blank" class="suggestion-btn">
            <span class="icon">💡</span>
            <span>想法&建议</span>
        </a>
    </div>
</body>
</html>
