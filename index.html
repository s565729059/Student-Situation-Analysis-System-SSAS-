<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青岛睿花苑·学生情况分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>青岛睿花苑·学生情况分析系统</h1>
            <h2>新生入学检测</h2>
        </header>
        
        <main>
            <section class="form-section">
                <form id="studentForm">
                    <div class="form-group">
                        <label for="name">姓名</label>
                        <input type="text" id="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="gender">性别</label>
                        <select id="gender" required>
                            <option value="">请选择</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="age">年龄</label>
                        <input type="number" id="age" required min="10" max="18">
                    </div>
                    
                    <div class="form-group">
                        <label for="grade">年级</label>
                        <select id="grade" required>
                            <option value="">请选择</option>
                            <option value="七年级">七年级</option>
                            <option value="八年级">八年级</option>
                            <option value="九年级">九年级</option>
                        </select>
                    </div>
                    
                    <div class="form-group grades-container" id="gradesContainer">
                        <h3>成绩输入</h3>
                        <!-- 成绩输入框将通过JavaScript动态生成 -->
                    </div>
                    
                    <button type="submit" class="submit-btn">开始分析</button>
                </form>
            </section>
            
            <section class="result-section" id="resultSection">
                <h3>分析结果</h3>
                <div class="result-content" id="resultContent">
                    <!-- 分析结果将在这里显示 -->
                </div>
                <div class="chart-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </section>
        </main>
        
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <p>正在分析，请稍候...</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
